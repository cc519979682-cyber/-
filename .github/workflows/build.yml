name: Build personal Shadowrocket rules

on:
  push:
    branches: [main]
    paths:
      - "personal/**"
      - "scripts/**"
      - ".github/workflows/build.yml"
  schedule:
    # 08:20 Beijing time, after the upstream daily build window.
    - cron: "20 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build public config
        run: python scripts/build_personal_shadowrocket.py

      - name: Commit generated config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sr_personal_whitelist_ad.conf personal/rules.conf
          git diff --cached --quiet || git commit -m "Build personal Shadowrocket rules"
          git push
